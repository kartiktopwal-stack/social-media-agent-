version: "3.9"

# Optional: run the FastAPI dashboard only. For the content pipeline, use
# `python run_pipeline.py` or `python main.py run` on the host (or in the container).
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: content-empire-app
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    ports:
      - "8000:8000"
    command: python main.py server
    restart: unless-stopped
